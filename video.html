<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Optical Illusion</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
        }

        body {
            margin: 0;
            overflow: hidden;
        }

        video {
            width: 100%;
            height: 100vh;
            object-fit: cover;
        }

        .volume-instructions {
            text-align: center;
            margin-top: 20px;
            color: #555;
        }
    </style>
</head>
<body>
    
    <div class="volume-instructions">
        <p>Please adjust your device's volume to the maximum for the best experience.</p>
    </div>

    <video autoplay volume="1.0" width="100%" height="100%">
        <source src="video.mp4" type="video/mp4">
    </video>

</body>
</html>
